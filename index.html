<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日本語タイピングゲーム</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>日本語タイピングゲーム</h1>
        <p class="subtitle">単語モードと文章モードで練習できます</p>
      </header>

      <section class="controls">
        <label for="mode">モード</label>
        <select id="mode">
          <option value="word">単語</option>
          <option value="sentence">文章</option>
        </select>
        <button id="next-btn" type="button">お題を変更</button>
      </section>

      <section class="card">
        <p class="label">お題（ひらがな）</p>
        <p id="target" class="target">読み込み中...</p>
        <p class="label">入力中</p>
        <p id="typed" class="typed"></p>
      </section>

      <section class="status">
        <p>正解数: <span id="score">0</span></p>
        <p>ミス数: <span id="miss">0</span></p>
      </section>

      <section class="keyboard-area">
        <p class="hint">キーボードでも、下のボタンタップでも入力できます。</p>
        <div id="on-screen-keyboard" class="keyboard"></div>
        <button id="backspace" class="action" type="button">⌫ 1文字消す</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
